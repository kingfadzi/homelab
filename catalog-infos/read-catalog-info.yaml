apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: research-documents
  description: "A WordPress site dedicated to hosting research documents."
  tags:
    - wordpress
    - documentation
    - research
  annotations:
    website/url: "http://read.butterflycluster.com"
    wordpress.org/theme: "Zeen"
    wordpress.org/plugins: "WordPress Migration"
    wordpress.org/version: "latest"
    hosting/environment: "VM on vSphere controlled via Webmin"
spec:
  type: website
  lifecycle: production
  owner: web-team
  dependsOn:
    - resource:cygnus
